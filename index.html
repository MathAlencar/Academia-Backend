<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Mini Chat - Teste Socket.IO + API</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 32px;
    }
    .chat-container {
      width: 420px;
      background: #020617;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 1px solid #1e293b;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      margin-right: 6px;
      display: inline-block;
    }
    .status-dot.off {
      background: #dc2626;
    }
    .status-dot.on {
      background: #22c55e;
    }
    .status-text {
      font-size: 12px;
      color: #9ca3af;
    }
    .conversation-info {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 8px;
    }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }
    button {
      background: #4f46e5;
      border: none;
      border-radius: 999px;
      padding: 6px 12px;
      color: white;
      font-size: 13px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    button.secondary {
      background: #1f2937;
    }
    .messages {
      background: #020617;
      border-radius: 12px;
      border: 1px solid #1e293b;
      padding: 8px;
      height: 260px;
      overflow-y: auto;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .message {
      margin-bottom: 6px;
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }
    .message.me {
      align-self: flex-end;
      text-align: right;
    }
    .bubble {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 12px;
      background: #111827;
      border: 1px solid #1f2937;
    }
    .message.me .bubble {
      background: #4f46e5;
      border-color: #6366f1;
    }
    .meta {
      font-size: 10px;
      color: #6b7280;
      margin-top: 2px;
    }
    .typing {
      font-size: 11px;
      color: #9ca3af;
      min-height: 14px;
      margin-bottom: 6px;
    }
    .input-row {
      display: flex;
      gap: 6px;
    }
    .input-row input {
      flex: 1;
      border-radius: 999px;
      border: 1px solid #1f2937;
      padding: 6px 10px;
      background: #020617;
      color: #e5e7eb;
      font-size: 13px;
      outline: none;
    }
    .log {
      font-size: 11px;
      color: #6b7280;
      max-height: 90px;
      overflow-y: auto;
      margin-top: 8px;
      border-top: 1px solid #1e2937;
      padding-top: 6px;
      white-space: pre-line;
    }
    .small-label {
      font-size: 11px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="header">
      <div>
        <div style="font-weight: 600; font-size: 14px;">Mini Chat de Teste</div>
        <div class="status-text" id="serverUrlLabel"></div>
      </div>
      <div>
        <span id="statusDot" class="status-dot off"></span>
        <span class="status-text" id="statusText">Desconectado</span>
      </div>
    </div>

    <div class="conversation-info" id="conversationInfo">
      Nenhuma conversa ainda.
    </div>

    <div class="controls">
      <button id="btnConnectCreate">1) Conectar & criar conversa</button>
      <button id="btnJoin" class="secondary">2) Entrar na conversa (join_conversation)</button>
      <div class="small-label">ID da conversa (pode sobrescrever manualmente):</div>
      <input type="number" id="conversaIdInput" placeholder="Ex: 12" />
      <button id="btnLoadMessages" class="secondary" disabled>3) Carregar mensagens da conversa (HTTP)</button>
    </div>

    <div class="messages" id="messages"></div>
    <div class="typing" id="typingIndicator"></div>

    <div class="input-row">
      <input id="messageInput" placeholder="Digite uma mensagem..." />
      <button id="btnSend" disabled>Enviar</button>
    </div>

    <div class="log" id="log"></div>
  </div>

  <script>
    // ================== CONFIGURAÇÕES ==================
    // 👇 TROCAR AQUI SE ESTIVER RODANDO EM OUTRO HOST/PORTA
    const SOCKET_URL = 'http://34.39.211.212:3018';  // ← URL do Socket.IO (porta do servidor)
    const API_BASE   = 'http://34.39.211.212:3018';  // ← Base das rotas HTTP

    // 👇 ENDPOINTS HTTP CONFORME SUAS ROTAS
    // /chat/ está como prefixo no App, então:
    const CREATE_CONVERSA_URL = API_BASE + '/chat/conversas/';   // POST ChatController.store
    const SEND_MESSAGE_URL    = API_BASE + '/chat/mensagens';    // POST ChatController.enviarMensagem
    const LIST_MESSAGES_URL   = API_BASE + '/chat/mensagens';    // GET  ChatController.listarMensagens ( /mensagens/:conversaId )

    // IDs fixos só pra teste (AJUSTE PARA SEUS DADOS REAIS)
    const USUARIO1_ID   = 15;        // ex.: aluno
    const TIPO_USUARIO1 = 'aluno';   // 'aluno' ou 'personal'
    const USUARIO2_ID   = 3;         // ex.: personal
    const TIPO_USUARIO2 = 'personal';

    // ================== ESTADO ==================
    let socket = null;
    let currentConversaId = null;
    let typingTimeout = null;

    // ================== ELEMENTOS ==================
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const conversationInfo = document.getElementById('conversationInfo');
    const messagesDiv = document.getElementById('messages');
    const typingIndicator = document.getElementById('typingIndicator');
    const messageInput = document.getElementById('messageInput');
    const logDiv = document.getElementById('log');
    const conversaIdInput = document.getElementById('conversaIdInput');

    const btnConnectCreate = document.getElementById('btnConnectCreate');
    const btnJoin = document.getElementById('btnJoin');
    const btnLoadMessages = document.getElementById('btnLoadMessages');
    const btnSend = document.getElementById('btnSend');

    document.getElementById('serverUrlLabel').textContent = SOCKET_URL;

    // ================== FUNÇÕES DE UI ==================
    function setStatus(connected) {
      if (connected) {
        statusDot.classList.remove('off');
        statusDot.classList.add('on');
        statusText.textContent = 'Conectado';
      } else {
        statusDot.classList.remove('on');
        statusDot.classList.add('off');
        statusText.textContent = 'Desconectado';
      }
    }

    function log(msg) {
      const time = new Date().toLocaleTimeString();
      logDiv.textContent += `[${time}] ${msg}\n`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function addMessage(msg, isMe = false) {
      const wrapper = document.createElement('div');
      wrapper.classList.add('message');
      if (isMe) wrapper.classList.add('me');

      const bubble = document.createElement('div');
      bubble.classList.add('bubble');
      bubble.textContent = msg.conteudo;

      const meta = document.createElement('div');
      meta.classList.add('meta');
      meta.textContent =
        (isMe ? 'Você' : `${msg.tipo_remetente || 'remetente'}`) +
        ' • ' +
        (msg.created_at
          ? new Date(msg.created_at).toLocaleTimeString()
          : new Date().toLocaleTimeString());

      wrapper.appendChild(bubble);
      wrapper.appendChild(meta);
      messagesDiv.appendChild(wrapper);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function setTyping(isTyping) {
      if (isTyping) {
        typingIndicator.textContent = 'Você está digitando...';
      } else {
        typingIndicator.textContent = '';
      }
    }

    // ================== SOCKET.IO ==================
    function connectSocket() {
      if (socket && socket.connected) {
        log('Socket já conectado.');
        return;
      }

      socket = io(SOCKET_URL, {
        transports: ['websocket'],
      });

      socket.on('connect', () => {
        setStatus(true);
        log('Conectado ao Socket.IO. ID: ' + socket.id);
      });

      socket.on('disconnect', () => {
        setStatus(false);
        log('Desconectado do Socket.IO.');
      });

      socket.on('connect_error', (err) => {
        setStatus(false);
        log('Erro de conexão: ' + err.message);
      });

      // Evento vindo do servidor quando alguém envia nova mensagem
      socket.on('nova_mensagem', (mensagem) => {
        log('nova_mensagem recebida via socket.');
        const isMe = mensagem.remetente_id === USUARIO1_ID;
        addMessage(mensagem, isMe);
      });
    }

    function joinConversationRoom() {
      if (!socket || !socket.connected) {
        log('Socket não conectado. Conecte primeiro.');
        return;
      }
      const id = conversaIdInput.value || currentConversaId;
      if (!id) {
        alert('Defina um ID de conversa primeiro.');
        return;
      }
      currentConversaId = Number(id);
      socket.emit('join_conversation', currentConversaId);
      conversationInfo.textContent = 'Conversa atual: ID ' + currentConversaId;
      log('join_conversation enviado para conversa_' + currentConversaId);
      btnSend.disabled = false;
      btnLoadMessages.disabled = false;
    }

    // ================== HTTP (API) ==================
    async function criarConversa() {
      try {
        connectSocket();

        const body = {
          usuario1_id: USUARIO1_ID,
          tipo_usuario1: TIPO_USUARIO1,
          usuario2_id: USUARIO2_ID,
          tipo_usuario2: TIPO_USUARIO2,
        };

        log('Criando conversa via ' + CREATE_CONVERSA_URL);
        const resp = await fetch(CREATE_CONVERSA_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await resp.json();
        if (!resp.ok) {
          log('Erro ao criar conversa: ' + JSON.stringify(data));
          alert('Erro ao criar conversa. Veja o log.');
          return;
        }

        currentConversaId = data.id;
        conversaIdInput.value = data.id;
        conversationInfo.textContent =
          'Conversa criada: ID ' + data.id + ' (entre ' +
          `${TIPO_USUARIO1} ${USUARIO1_ID} e ${TIPO_USUARIO2} ${USUARIO2_ID})`;
        log('Conversa criada com ID ' + data.id);

        btnJoin.disabled = false;
      } catch (err) {
        log('Erro criarConversa: ' + err.message);
        alert('Erro na requisição. Veja o log.');
      }
    }

    async function carregarMensagens() {
      const id = conversaIdInput.value || currentConversaId;
      if (!id) {
        alert('Defina um ID de conversa primeiro.');
        return;
      }

      const url = `${LIST_MESSAGES_URL}/${id}`; // GET /chat/mensagens/:conversaId
      log('Carregando mensagens via ' + url);

      try {
        const resp = await fetch(url);
        const data = await resp.json();

        if (!resp.ok) {
          log('Erro ao listar mensagens: ' + JSON.stringify(data));
          alert('Erro ao listar mensagens. Veja o log.');
          return;
        }

        messagesDiv.innerHTML = '';
        (data || []).forEach((m) => {
          const isMe = m.remetente_id === USUARIO1_ID;
          addMessage(m, isMe);
        });
        log('Mensagens carregadas. Total: ' + (data || []).length);
      } catch (err) {
        log('Erro carregarMensagens: ' + err.message);
      }
    }

    async function enviarMensagem() {
      const texto = messageInput.value.trim();
      if (!texto) return;

      if (!currentConversaId && !conversaIdInput.value) {
        alert('Defina uma conversa primeiro (crie ou informe o ID).');
        return;
      }

      const conversaId = Number(conversaIdInput.value || currentConversaId);

      const body = {
        conversa_id: conversaId,
        remetente_id: USUARIO1_ID,
        tipo_remetente: TIPO_USUARIO1, // 'aluno' ou 'personal'
        conteudo: texto,
      };

      log('Enviando mensagem via ' + SEND_MESSAGE_URL);
      try {
        const resp = await fetch(SEND_MESSAGE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await resp.json();

        if (!resp.ok) {
          log('Erro ao enviar mensagem: ' + JSON.stringify(data));
          alert('Erro ao enviar mensagem. Veja o log.');
          return;
        }

        // Esperamos o 'nova_mensagem' via socket
        messageInput.value = '';
        setTyping(false);
      } catch (err) {
        log('Erro enviarMensagem: ' + err.message);
      }
    }

    // ================== EVENTOS DA UI ==================
    btnConnectCreate.addEventListener('click', criarConversa);
    btnJoin.addEventListener('click', joinConversationRoom);
    btnLoadMessages.addEventListener('click', carregarMensagens);
    btnSend.addEventListener('click', enviarMensagem);

    messageInput.addEventListener('input', () => {
      setTyping(true);
      if (typingTimeout) clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => setTyping(false), 600);
    });

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        enviarMensagem();
      }
    });

    // Já conecta o socket ao abrir a página
    connectSocket();
  </script>
</body>
</html>
